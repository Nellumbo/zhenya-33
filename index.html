<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Женя Попов — 33</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B8%3C/text%3E%3C/svg%3E">
  <style>
/* ════════════════════════════════════════════════════════
   RESET & VARS
════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07070d;
  --surface:rgba(255,255,255,.04);
  --gold:#d4a843;
  --gold2:#f0c060;
  --gold-glow:rgba(212,168,67,.45);
  --crimson:#c0193f;
  --ivory:#f5efdd;
  --muted:rgba(245,239,221,.38);
  --glass:rgba(245,239,221,.06);
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--ivory);
  font-family:'DM Sans',system-ui,sans-serif;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
}

/* ════════════════════════════════════════════════════════
   FILM GRAIN
════════════════════════════════════════════════════════ */
#grain{
  position:fixed;inset:0;z-index:998;
  pointer-events:none;opacity:.042;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:190px 190px;
  animation:grain .6s steps(3) infinite;
}
@keyframes grain{
  0%  {transform:translate(0,0)}
  33% {transform:translate(-3%,2%)}
  66% {transform:translate(3%,-3%)}
  100%{transform:translate(-2%,3%)}
}

/* Confetti canvas */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:989}

/* ════════════════════════════════════════════════════════
   PHOTO BACKGROUNDS (blurred, atmospheric)
════════════════════════════════════════════════════════ */
.ph-bg{
  position:absolute;inset:-40px;
  background-size:cover;background-position:center top;
  filter:blur(28px) brightness(.22) saturate(.6);
  transform:scale(1.2);
  pointer-events:none;
}

/* ════════════════════════════════════════════════════════
   INTRO
════════════════════════════════════════════════════════ */
#intro{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
  transition:opacity .9s ease;
}

/* Floating gold sparks */
.spark{
  position:absolute;
  border-radius:50%;
  background:var(--gold);
  opacity:0;
  animation:spark-up linear infinite;
}
@keyframes spark-up{
  0%  {opacity:0;transform:translateY(0) scale(0)}
  8%  {opacity:.9;transform:translateY(-12px) scale(1)}
  80% {opacity:.25;transform:translateY(var(--d)) scale(.3)}
  100%{opacity:0;transform:translateY(var(--d)) scale(0)}
}

.intro-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:0 28px;
}

/* Staggered entrance */
.intro-content>*{animation:fade-up .9s ease both}
.intro-eyebrow  {animation-delay:.15s}
.intro-year     {animation-delay:.3s}
.intro-rule     {animation-delay:.45s}
.intro-name     {animation-delay:.55s}
.intro-sub      {animation-delay:.65s}
.intro-hint     {animation-delay:.75s}
#intro-btn      {animation-delay:.88s}
@keyframes fade-up{
  from{opacity:0;transform:translateY(22px)}
  to  {opacity:1;transform:translateY(0)}
}

.intro-eyebrow{
  font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:400;
  letter-spacing:.38em;text-transform:uppercase;
  color:var(--gold);opacity:.75;margin-bottom:10px;
}

.intro-year{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(128px,38vw,196px);
  line-height:.82;
  color:transparent;
  background:linear-gradient(168deg,var(--gold2) 15%,var(--gold) 50%,#9a6e1a 100%);
  -webkit-background-clip:text;background-clip:text;
  animation:year-glow 2.8s ease-in-out infinite,fade-up .9s .3s ease both;
}
@keyframes year-glow{
  0%,100%{filter:drop-shadow(0 0 28px rgba(212,168,67,.45))}
  50%    {filter:drop-shadow(0 0 60px rgba(212,168,67,.85)) drop-shadow(0 0 100px rgba(212,168,67,.3))}
}

.intro-rule{
  width:140px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:16px 0;
}

.intro-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,5.8vw,30px);font-weight:300;
  letter-spacing:.26em;text-transform:uppercase;
  color:var(--ivory);
}

.intro-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;font-style:italic;
  color:var(--muted);margin-top:6px;letter-spacing:.06em;
}

.intro-hint{
  margin-top:26px;
  font-size:12px;color:rgba(245,239,221,.5);
  letter-spacing:.04em;line-height:1.6;
  animation:float-h 1.7s ease-in-out infinite, fade-up .9s .75s ease both;
}
@keyframes float-h{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

#intro-btn{
  margin-top:18px;
  padding:13px 40px;
  background:transparent;
  border:1px solid rgba(212,168,67,.6);
  border-radius:2px;
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:500;
  letter-spacing:.3em;text-transform:uppercase;
  color:var(--gold);cursor:pointer;
  position:relative;overflow:hidden;
  transition:color .35s, border-color .35s;
}
#intro-btn::before{
  content:'';position:absolute;inset:0;
  background:var(--gold);
  transform:translateX(-102%);
  transition:transform .38s cubic-bezier(.4,0,.2,1);
}
#intro-btn span{position:relative;z-index:1}
#intro-btn:active::before{transform:translateX(0)}
#intro-btn:active span{color:#07070d}

/* ════════════════════════════════════════════════════════
   GAME SCENE
════════════════════════════════════════════════════════ */
#scene{position:fixed;inset:0;overflow:hidden}

#counter{
  position:fixed;top:18px;right:18px;
  font-family:'Bebas Neue',cursive;
  font-size:26px;letter-spacing:.08em;
  color:var(--gold);
  background:rgba(7,7,13,.72);
  backdrop-filter:blur(10px);
  border:1px solid rgba(212,168,67,.22);
  padding:8px 18px 6px;
  border-radius:3px;z-index:200;
}
#counter span{color:var(--muted);font-size:20px}

.game-lbl{
  position:fixed;top:22px;left:18px;
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(245,239,221,.3);z-index:200;line-height:1.4;
}

/* ════════════════════════════════════════════════════════
   FLOATING HEADS
════════════════════════════════════════════════════════ */
.head{
  position:absolute;left:0;top:0;
  border-radius:50%;
  will-change:transform;
  cursor:pointer;
  user-select:none;-webkit-user-select:none;
  background:var(--bg);
  z-index:100;
  /* colored ring per head via --rc / --rs */
  box-shadow:0 0 0 3px var(--rc), 0 0 18px var(--rs), 0 4px 20px rgba(0,0,0,.5);
  animation:ring-pulse 2.4s ease-in-out infinite;
}
@keyframes ring-pulse{
  0%,100%{box-shadow:0 0 0 2px var(--rc),0 0 12px var(--rs),0 4px 20px rgba(0,0,0,.5)}
  50%    {box-shadow:0 0 0 4px var(--rc),0 0 30px var(--rs),0 4px 24px rgba(0,0,0,.5)}
}

/* tap animation uses a wrapper to preserve JS transform */
.head-tap{
  width:100%;height:100%;
  border-radius:50%;overflow:hidden;
}
.head.tapping .head-tap{animation:tap-pop .32s ease}
@keyframes tap-pop{
  0%  {transform:scale(1)}
  28% {transform:scale(1.38) rotate(9deg)}
  62% {transform:scale(.88) rotate(-5deg)}
  100%{transform:scale(1)}
}

.head-tap img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  pointer-events:none;
}
.emoji-fb{
  display:none;position:absolute;inset:0;
  align-items:center;justify-content:center;
  border-radius:50%;
}

/* caught state */
.head.caught{cursor:default;pointer-events:none;animation:none}
.head.caught{
  box-shadow:0 0 0 3px #4ade80,0 0 22px rgba(74,222,128,.55),0 4px 20px rgba(0,0,0,.5)!important;
}
.head.caught .head-tap img,
.head.caught .head-tap .emoji-fb{filter:brightness(.42) saturate(.2)}

.checkmark{
  display:none;
  position:absolute;inset:0;
  align-items:center;justify-content:center;
  font-size:48%;font-weight:900;
  color:#4ade80;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
  z-index:10;pointer-events:none;
}
.head.caught .checkmark{display:flex}

/* speech bubble */
.bubble{
  position:absolute;top:-50px;left:50%;
  transform:translateX(-50%);
  background:var(--ivory);color:#07070d;
  padding:5px 11px;border-radius:8px;
  font-size:12px;font-weight:500;
  white-space:nowrap;opacity:0;
  pointer-events:none;z-index:300;
  font-family:'DM Sans',sans-serif;
}
.bubble::after{
  content:'';position:absolute;bottom:-5px;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:var(--ivory);border-bottom:0;
}
@keyframes bub{
  0%  {opacity:0;transform:translateX(-50%) translateY(5px) scale(.78)}
  14% {opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  75% {opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-5px) scale(.9)}
}
.bubble.show{animation:bub 1.1s ease forwards}

/* ════════════════════════════════════════════════════════
   REVEAL
════════════════════════════════════════════════════════ */
#reveal{
  position:fixed;inset:0;
  background:rgba(7,7,13,.93);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:400;
  backdrop-filter:blur(8px);
}
#reveal[hidden]{display:none}

.reveal-icon{
  font-size:60px;
  animation:wobble .75s ease-in-out infinite alternate;
}
@keyframes wobble{
  from{transform:rotate(-10deg) scale(1)}
  to  {transform:rotate(10deg) scale(1.1)}
}

.reveal-num{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(72px,22vw,110px);
  line-height:.9;margin-top:4px;
  color:transparent;
  background:linear-gradient(168deg,var(--gold2) 15%,var(--gold) 55%,#9a6e1a 100%);
  -webkit-background-clip:text;background-clip:text;
  filter:drop-shadow(0 0 22px rgba(212,168,67,.65));
}

.reveal-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,5vw,28px);font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  color:var(--ivory);margin-top:6px;
}

.reveal-sub{
  font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.1em;
  color:var(--muted);margin-top:4px;
}

/* Polaroid photo strip */
.photo-strip{
  display:flex;gap:8px;
  justify-content:center;
  padding:14px 12px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x;
  margin-top:8px;width:100%;
}
.photo-strip::-webkit-scrollbar{display:none}

.polaroid{
  flex-shrink:0;scroll-snap-align:center;
  width:64px;
  background:#f5f0e8;
  padding:4px 4px 18px;
  box-shadow:0 10px 30px rgba(0,0,0,.7),0 2px 8px rgba(0,0,0,.4);
  transform:rotate(var(--rot,0deg));
  border-radius:1px;
  position:relative;
  transition:transform .2s;
  cursor:pointer;
}
.polaroid:active{transform:rotate(var(--rot,0deg)) scale(.93) !important}

.polaroid img,.polar-fb{
  width:56px;height:56px;
  display:block;object-fit:cover;
}
.polar-fb{
  display:none;
  align-items:center;justify-content:center;
  font-size:26px;
}
.polaroid-lbl{
  position:absolute;bottom:3px;left:0;right:0;
  font-family:'DM Sans',sans-serif;
  font-size:7px;color:#888;
  text-align:center;letter-spacing:.05em;
}

#play-btn{
  margin-top:22px;
  padding:14px 40px;
  background:linear-gradient(135deg,var(--crimson),#8b112e);
  color:#fff;border:none;border-radius:2px;
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:500;
  letter-spacing:.28em;text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 4px 32px rgba(192,25,63,.5);
  animation:btn-pulse 1.3s ease-in-out infinite;
}
@keyframes btn-pulse{
  0%,100%{transform:scale(1);box-shadow:0 4px 32px rgba(192,25,63,.5)}
  50%    {transform:scale(1.04);box-shadow:0 6px 44px rgba(192,25,63,.7)}
}
#play-btn:active{transform:scale(.93)!important;animation:none}
#play-btn:disabled{opacity:.5;cursor:wait;animation:none}

/* ════════════════════════════════════════════════════════
   PLAYER — KEN BURNS BACKGROUND
════════════════════════════════════════════════════════ */
#player{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:var(--bg);
  overflow:hidden;
}
#player[hidden]{display:none}

/* Aurora gradient background — player */
#kb-bg{position:absolute;inset:0;z-index:0;overflow:hidden}

/* Aurora gradient background — intro */
#intro-aurora{position:absolute;inset:0;z-index:0;overflow:hidden}
@keyframes aur1{0%{transform:translate(-50%,-50%) scale(1)}   100%{transform:translate(calc(-50% + 110px),calc(-50% - 80px)) scale(1.28)}}
@keyframes aur2{0%{transform:translate(-50%,-50%) scale(1)}   100%{transform:translate(calc(-50% - 95px),calc(-50% + 105px)) scale(0.82)}}
@keyframes aur3{0%{transform:translate(-50%,-50%) scale(1)}   100%{transform:translate(calc(-50% + 65px),calc(-50% - 90px)) scale(1.18)}}
@keyframes aur4{0%{transform:translate(-50%,-50%) scale(1)}   100%{transform:translate(calc(-50% - 70px),calc(-50% + 60px)) scale(0.88)}}

/* Cinematic vignette */
.player-vig{
  position:absolute;inset:0;z-index:1;
  background:
    radial-gradient(ellipse at 50% 50%,transparent 35%,rgba(7,7,13,.75) 100%),
    linear-gradient(to bottom,rgba(7,7,13,.65) 0%,transparent 22%,transparent 68%,rgba(7,7,13,.95) 100%);
  pointer-events:none;
}

.player-header{
  position:relative;z-index:2;
  padding:16px 20px 4px;text-align:center;flex-shrink:0;
}
.player-eyebrow{
  font-size:9px;font-weight:400;
  letter-spacing:.35em;text-transform:uppercase;
  color:var(--gold);opacity:.8;
}
.player-title{
  font-family:'Cormorant Garamond',serif;
  font-size:19px;font-weight:300;
  letter-spacing:.12em;color:var(--ivory);margin-top:3px;
}

/* Karaoke 2-line middle area — compact, does NOT flex-grow */
.player-middle{
  position:relative;z-index:2;
  flex-shrink:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:10px 24px 14px;
  text-align:center;overflow:hidden;
}
/* Two-slot scroll container for current lyric */
.lyric-curr-box{
  position:relative;
  width:100%;height:clamp(70px,22vw,96px);
  overflow:hidden;
}
.lyric-slot{
  position:absolute;inset:0;
  font-family:'Oswald',sans-serif;
  font-size:clamp(20px,5.8vw,30px);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--ivory);
  text-shadow:0 0 32px rgba(212,168,67,.45),0 2px 10px rgba(0,0,0,.9);
  display:flex;align-items:center;justify-content:center;
  padding:0 16px;text-align:center;
  transition:transform .42s cubic-bezier(.4,0,.2,1),opacity .35s;
}
.lyric-slot.ls-curr { transform:translateY(0);    opacity:1 }
.lyric-slot.ls-above{ transform:translateY(-115%);opacity:0 }
.lyric-slot.ls-below{ transform:translateY(115%); opacity:0 }

#lyric-next{
  margin-top:10px;
  font-family:'Oswald',sans-serif;
  font-size:clamp(14px,3.8vw,20px);
  font-weight:400;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:rgba(245,239,221,.3);
  line-height:1.3;
  min-height:1.6em;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .3s;
}

/* Photo reel slideshow — grows to fill available space */
.photo-reel{
  position:relative;z-index:2;
  width:100%;
  flex:1;
  min-height:180px;
  overflow:hidden;
  cursor:pointer;
}
.reel-slide{
  position:absolute;inset:0;
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0;
  transition:opacity .9s ease;
}
.reel-slide.reel-active{opacity:1}
.reel-slide::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(7,7,13,.55) 0%,transparent 35%,transparent 65%,rgba(7,7,13,.55) 100%);
}
.reel-dots{
  position:absolute;bottom:8px;left:0;right:0;
  display:flex;justify-content:center;gap:5px;z-index:4;
}
.reel-dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(255,255,255,.3);
  transition:background .3s,transform .3s;
}
.reel-dot.active{background:var(--gold);transform:scale(1.5)}

/* Visualizer canvas */
#visualizer{
  position:relative;z-index:2;
  width:100%;height:46px;
  display:block;flex-shrink:0;
}

/* Lightbox */
#lightbox{
  display:none;
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  align-items:center;justify-content:center;
  flex-direction:column;gap:20px;
  touch-action:auto;
}
#lightbox.open{display:flex}
#lb-img{
  max-width:88vw;max-height:74vh;
  border-radius:3px;
  object-fit:contain;
  box-shadow:0 24px 80px rgba(0,0,0,.85);
  animation:lb-in .32s cubic-bezier(.34,1.56,.64,1);
}
@keyframes lb-in{
  from{transform:scale(.55);opacity:0}
  to  {transform:scale(1);opacity:1}
}
#lb-fb{
  display:none;
  width:200px;height:200px;
  border-radius:3px;
  align-items:center;justify-content:center;
  font-size:72px;
  animation:lb-in .32s cubic-bezier(.34,1.56,.64,1);
}
#lb-close{
  background:transparent;
  border:1px solid rgba(245,239,221,.22);
  border-radius:2px;
  padding:11px 32px;
  font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(245,239,221,.5);cursor:pointer;
}

/* Player controls */
.player-bottom{
  position:relative;z-index:2;
  padding:10px 22px 38px;flex-shrink:0;
  background:linear-gradient(to top,rgba(7,7,13,1) 72%,transparent);
}
.prog-wrap{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;
}
.t{font-size:10px;color:var(--muted);min-width:32px;font-variant-numeric:tabular-nums}
.t.r{text-align:right}
#progress-bar{
  flex:1;height:1px;
  background:rgba(245,239,221,.18);
  border-radius:1px;overflow:hidden;
}
#progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold),var(--crimson));
  transition:width .25s linear;
}
.ctrl{display:flex;align-items:center;justify-content:center}
#toggle-btn{
  width:58px;height:58px;border-radius:50%;
  background:transparent;
  border:1.5px solid rgba(212,168,67,.6);
  color:var(--gold);font-size:20px;
  cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  transition:all .22s;
}
#toggle-btn:active{background:var(--gold);color:var(--bg);border-color:var(--gold);transform:scale(.9)}
  </style>
</head>
<body>

<div id="grain"></div>
<canvas id="confetti"></canvas>

<!-- ═══ INTRO ════════════════════════════════════════════ -->
<div id="intro">
  <div id="intro-aurora"></div>
  <div id="sparks"></div>
  <div class="intro-content">
    <div class="intro-eyebrow">✦ С Днём Рождения ✦</div>
    <div class="intro-year">33</div>
    <div class="intro-rule"></div>
    <div class="intro-name">Женя Попов</div>
    <div class="intro-sub">Тридцать три — и это только начало</div>

/* ── STATE ────────────────────────────────────────────────── */

const caught = new Set();
const headObjs = [];
const headEls  = [];
let rafGame = null;
const confParts  = [];
let confSpawning = false;
let currentLyric = -1;

/* ── INTRO SPARKLES ──────────────────────────────────────── */

function buildSparks() {
  const c = document.getElementById('sparks');
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');

      (Math.random() > .6 ? 'background:#f0c060;' : '');

/* ── HEAD CREATION ───────────────────────────────────────── */

function createHeads() {
  const scene = document.getElementById('scene');
  const W = window.innerWidth, H = window.innerHeight;

  SIZES.forEach((size, i) => {
    const pad   = size + 28;
    const speed = 1.9 + Math.random() * 2.5;
    const angle = Math.random() * Math.PI * 2;

    headObjs.push({
      x:  pad + Math.random() * (W - pad * 2 - size),
      y:  pad + Math.random() * (H - pad * 2 - size),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size,
    });

    const el    = document.createElement('div');
    const tap   = document.createElement('div');
    const img   = document.createElement('img');
    const fb    = document.createElement('div');
    const chk   = document.createElement('div');
    const bub   = document.createElement('div');

    el.className  = 'head';
    tap.className = 'head-tap';
    fb.className  = 'emoji-fb';
    chk.className = 'checkmark'; chk.textContent = '✓';
    bub.className = 'bubble';

    el.style.cssText  = `width:${size}px;height:${size}px;--rc:${RING[i].solid};--rs:${RING[i].shadow}`;
    fb.style.cssText  = `background:${GRADS[i]};font-size:${Math.round(size*.46)}px`;
    fb.textContent    = EMOJIS[i];

    img.src = PHOTOS[i]; img.alt = 'Женя';
    img.onerror = function() {
      this.style.display = 'none';
      fb.style.display = 'flex';
    };

    tap.append(img, fb);
    el.append(tap, chk, bub);
    scene.appendChild(el);
    headEls.push(el);

    putHead(i);
    el.addEventListener('pointerdown', e => { e.preventDefault(); catchHead(i); });
  });
}

function putHead(i) {
  const h = headObjs[i];
  headEls[i].style.transform = `translate(${h.x}px,${h.y}px)`;
}

/* ── BOUNCE ──────────────────────────────────────────────── */

function bounceLoop() {
  const W = window.innerWidth, H = window.innerHeight;
  headObjs.forEach((h, i) => {
    if (caught.has(i)) return;
    h.x += h.vx; h.y += h.vy;
    if (h.x <= 0)          { h.x = 0;          h.vx =  Math.abs(h.vx); }
    if (h.x >= W - h.size) { h.x = W - h.size; h.vx = -Math.abs(h.vx); }
    if (h.y <= 0)          { h.y = 0;           h.vy =  Math.abs(h.vy); }
    if (h.y >= H - h.size) { h.y = H - h.size;  h.vy = -Math.abs(h.vy); }
    putHead(i);
  });
  rafGame = requestAnimationFrame(bounceLoop);
}

/* ── CATCH ───────────────────────────────────────────────── */

function catchHead(i) {
  if (caught.has(i)) return;
  caught.add(i);
  headObjs[i].vx = 0; headObjs[i].vy = 0;

  const el = headEls[i];
  el.classList.add('tapping');
  setTimeout(() => el.classList.remove('tapping'), 340);
  setTimeout(() => el.classList.add('caught'), 260);

  const bub = el.querySelector('.bubble');
  bub.textContent = PHRASES[Math.floor(Math.random() * PHRASES.length)];
  bub.classList.remove('show'); void bub.offsetWidth; bub.classList.add('show');

  document.getElementById('counter').innerHTML = `${caught.size}<span>/5</span>`;
  if (caught.size >= 5) setTimeout(triggerWin, 950);
}

function triggerWin() {
  cancelAnimationFrame(rafGame); rafGame = null;
  buildPhotoStrip();
  document.getElementById('reveal').removeAttribute('hidden');
  startConfetti();
}

/* ── CONFETTI ────────────────────────────────────────────── */

const CC = ['#d4a843','#f0c060','#c0193f','#f5efdd','#7c3aed','#4ade80','#f97316'];

function mkP(burst) {
  const W = window.innerWidth, H = window.innerHeight;
  return {
    x:  burst ? Math.random() * W : Math.random() * W,
    y:  burst ? Math.random() * H * .55 : -12,
    vx: (Math.random() - .5) * (burst ? 9 : 2.8),
    vy: burst ? -Math.random() * 11 - 3 : Math.random() * 3.2 + 1.5,
    g:  .11 + Math.random() * .09,
    rot: Math.random() * 360,
    rv:  (Math.random() - .5) * 7,
    col: CC[Math.floor(Math.random() * CC.length)],
    sz:  Math.random() * 10 + 4,
    op:  1,
    round: Math.random() > .5,
  };
}

function startConfetti() {
  const cv = document.getElementById('confetti');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  for (let i = 0; i < 160; i++) confParts.push(mkP(true));
  confSpawning = true;
  confLoop();
  // Stop spawning new particles after 4.5s — existing ones fall out on their own
  setTimeout(() => { confSpawning = false; }, 4500);
}

function stopConfetti() {
  confSpawning = false;
  confParts.length = 0;
  const cv = document.getElementById('confetti');
  cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
}

function confLoop() {
  // Keep running until all particles have fallen off screen
  if (confParts.length === 0 && !confSpawning) return;
  const cv  = document.getElementById('confetti');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);

  if (confSpawning && Math.random() < .22 && confParts.length < 220) confParts.push(mkP(false));

  for (let i = confParts.length - 1; i >= 0; i--) {
    const p = confParts[i];
    p.x += p.vx; p.y += p.vy; p.vy += p.g; p.vx *= .993; p.rot += p.rv;
    if (p.y > cv.height * .82) p.op -= .024;
    if (p.op <= 0 || p.y > cv.height + 20) { confParts.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = p.op; ctx.fillStyle = p.col;
    ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
    if (p.round) { ctx.beginPath(); ctx.arc(0, 0, p.sz / 2, 0, Math.PI * 2); ctx.fill(); }
    else         { ctx.fillRect(-p.sz / 2, -p.sz / 4, p.sz, p.sz / 2); }
    ctx.restore();
  }
  requestAnimationFrame(confLoop);
}

/* ── PHOTO REEL (auto-slideshow in player) ───────────────── */

let _reelIdx  = 0;
let _reelSrcs = [];   // only actually-existing photos
let _reelTimer = null;

// Called at page load — uses HEAD requests (no image data in memory)
function preloadGallery() {
  let pending = GALLERY.length;
  const valid = new Array(GALLERY.length).fill(null);
  GALLERY.forEach((src, i) => {
    fetch(src, { method: 'HEAD' })
      .then(r => { if (r.ok) valid[i] = src; })
      .catch(() => {})
      .finally(() => { if (--pending === 0) _reelSrcs = valid.filter(Boolean); });
  });
}

function initReel() {
  const wrap = document.getElementById('photo-reel');
  wrap.innerHTML = '';
  _reelIdx = 0;
  if (_reelTimer) { clearInterval(_reelTimer); _reelTimer = null; }

  if (_reelSrcs.length > 0) {
    // Already preloaded in background — instant
    buildReel(_reelSrcs);
  } else {
    // Fallback: check existence via HEAD requests (no image data in memory)
    let pending = GALLERY.length;
    const valid = new Array(GALLERY.length).fill(null);
    GALLERY.forEach((src, i) => {
      fetch(src, { method: 'HEAD' })
        .then(r => { if (r.ok) valid[i] = src; })
        .catch(() => {})
        .finally(() => { if (--pending === 0) buildReel(valid.filter(Boolean)); });
    });
  }
}

function buildReel(srcs) {
  _reelSrcs = srcs;
  const wrap = document.getElementById('photo-reel');
  if (!srcs.length) { wrap.style.display = 'none'; return; }

  srcs.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'reel-slide' + (i === 0 ? ' reel-active' : '');
    slide.dataset.src = src;
    // Lazy: only load the first slide's image now; rest load when they become active
    if (i === 0) slide.style.backgroundImage = `url('${src}')`;
    wrap.appendChild(slide);
  });

  if (srcs.length > 1) {
    const dots = document.createElement('div');
    dots.className = 'reel-dots';
    srcs.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'reel-dot' + (i === 0 ? ' active' : '');
      dots.appendChild(d);
    });
    wrap.appendChild(dots);
    _reelTimer = setInterval(advanceReel, 3800);
  }

  wrap.addEventListener('pointerdown', () => openLightboxSrc(_reelSrcs[_reelIdx]));
}

function advanceReel() {
  const wrap   = document.getElementById('photo-reel');
  const slides = wrap.querySelectorAll('.reel-slide');
  const dots   = wrap.querySelectorAll('.reel-dot');
  slides[_reelIdx].classList.remove('reel-active');
  if (dots.length) dots[_reelIdx].classList.remove('active');
  _reelIdx = (_reelIdx + 1) % _reelSrcs.length;
  const next = slides[_reelIdx];
  // Lazy-load background on first reveal
  if (!next.style.backgroundImage && next.dataset.src) {
    next.style.backgroundImage = `url('${next.dataset.src}')`;
  }
  next.classList.add('reel-active');
  if (dots.length) dots[_reelIdx].classList.add('active');
}

let _slotActive = 'a';

function setLyricCurr(text) {
  const nextId = _slotActive === 'a' ? 'b' : 'a';
  const currEl = document.getElementById('lyric-slot-' + _slotActive);

  // Snap incoming slot below without transition, then trigger both transitions
  nextEl.style.transition = 'none';
  nextEl.className = 'lyric-slot ls-below';
  nextEl.textContent = text;

  requestAnimationFrame(() => requestAnimationFrame(() => {
    nextEl.style.transition = '';
    currEl.className = 'lyric-slot ls-above';
    nextEl.className = 'lyric-slot ls-curr';
  }));

  _slotActive = nextId;
}

  slotA.className = 'lyric-slot ls-curr'; slotA.textContent = '';
  slotB.className = 'lyric-slot ls-below'; slotB.textContent = '';
  document.getElementById('lyric-next').textContent = '';

  const audio = document.getElementById('song');
  audio.addEventListener('timeupdate', onTime);
  audio.addEventListener('ended', () => {
    document.getElementById('toggle-btn').textContent = '▶';
  });
  document.getElementById('toggle-btn').addEventListener('click', togglePlay);
  initVisualizer();
}

function onTime() {
  const audio = document.getElementById('song');
  const t = audio.currentTime;

  let idx = -1;
  for (let i = LYRICS.length - 1; i >= 0; i--) {
    if (t >= LYRICS[i].time) { idx = i; break; }
  }

  if (idx !== currentLyric) {
    currentLyric = idx;
    const curr = idx >= 0 ? LYRICS[idx].line : '';
    const next = (idx >= 0 && idx + 1 < LYRICS.length) ? LYRICS[idx + 1].line : '';
    setLyricCurr(curr);
    document.getElementById('lyric-next').textContent = next;
  }

  if (audio.duration) {
    document.getElementById('progress-fill').style.width = (t / audio.duration * 100) + '%';
    document.getElementById('tc').textContent = fmt(t);
    document.getElementById('tt').textContent = fmt(audio.duration);
  }
}

/* ── AUDIO VISUALIZER (simulated — no Web Audio API) ─────── */

let _visCtx  = null;
let _visRaf  = null;
const _visVals = Array.from({length: 48}, () => Math.random() * .15);
const _visTgts = Array.from({length: 48}, () => Math.random());

function initVisualizer() {
  const canvas = document.getElementById('visualizer');
  const dpr    = window.devicePixelRatio || 1;
  const W      = window.innerWidth;
  const H      = 46;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  _visCtx = canvas.getContext('2d');
  if (_visRaf) cancelAnimationFrame(_visRaf);
  visFrame();
}

function visFrame() {
  _visRaf = requestAnimationFrame(visFrame);
  if (!_visCtx) return;
  const audio   = document.getElementById('song');
  const playing = !audio.paused && !audio.ended;
  const cw = _visCtx.canvas.width;
  const ch = _visCtx.canvas.height;
  _visCtx.clearRect(0, 0, cw, ch);

  const bars = 48;
  const bw   = cw / bars;
  const gap  = bw * .18;

  for (let i = 0; i < bars; i++) {
    if (playing) {
      if (Math.random() < .06) _visTgts[i] = Math.random() * .88 + .06;
      _visVals[i] += (_visTgts[i] - _visVals[i]) * .1;
    } else {
      _visVals[i] *= .88;
    }
    const h = _visVals[i] * ch * .85;
    if (h < 1) continue;
    const x     = i * bw + gap / 2;
    const y     = ch - h;
    const ratio = _visVals[i];
    const r = Math.round(212 - 20 * ratio);
    const g = Math.round(168 - 143 * ratio);
    _visCtx.fillStyle = `rgba(${r},${g},67,.72)`;
    _visCtx.fillRect(x, y, bw - gap, h);
  }
}

/* ── LIGHTBOX ────────────────────────────────────────────── */

function openLightbox(idx) {
  const lb    = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbFb  = document.getElementById('lb-fb');

  lbImg.style.display = 'none';
  lbFb.style.display  = 'none';

  lbImg.onerror = () => {
    lbFb.style.cssText = `display:flex;background:${GRADS[idx]}`;
    lbFb.textContent   = EMOJIS[idx];
  };
  lbImg.onload = () => { lbImg.style.display = 'block'; };
  lbImg.src = PHOTOS[idx];

  lb.classList.add('open');
}

function openLightboxSrc(src) {
  const lb    = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbFb  = document.getElementById('lb-fb');
  lbImg.style.display = 'none';
  lbFb.style.display  = 'none';
  lbImg.onerror = () => {
    lbFb.style.cssText = 'display:flex;font-size:72px';
    lbFb.textContent   = '📸';
  };
  lbImg.onload = () => { lbImg.style.display = 'block'; };
  lbImg.src = src;
  lb.classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function togglePlay() {
  const a = document.getElementById('song');
  const b = document.getElementById('toggle-btn');
  if (a.paused) { a.play(); b.textContent = '⏸'; }
  else          { a.pause(); b.textContent = '▶'; }
}

function fmt(s) {
  return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
}

/* ── FLOW ────────────────────────────────────────────────── */

buildSparks();
spawnAurora(document.getElementById('intro-aurora'));
preloadGallery(); // start checking photos in background immediately

document.getElementById('lightbox').addEventListener('pointerdown', closeLightbox);

document.getElementById('intro-btn').addEventListener('click', () => {
  const intro = document.getElementById('intro');
  intro.style.opacity = '0';
  setTimeout(() => intro.style.display = 'none', 900);
  const scene = document.getElementById('scene');
  scene.style.display = 'block';
  createHeads();
  bounceLoop();
});

document.getElementById('play-btn').addEventListener('click', () => {
  const btn   = document.getElementById('play-btn');
  const audio = document.getElementById('song');
  let started = false;

  const go = () => {
    if (started) return; started = true;
    stopConfetti();
    document.getElementById('reveal').setAttribute('hidden', '');
    document.getElementById('player').removeAttribute('hidden');
    initPlayer();
    initAurora();
    initReel();
    audio.play()
      .then(() => document.getElementById('toggle-btn').textContent = '⏸')
      .catch(() => document.getElementById('toggle-btn').textContent = '▶');
  };

  if (audio.readyState < 3) {
    btn.disabled = true;
    btn.textContent = '⏳ Загрузка...';
    audio.addEventListener('canplaythrough', go, { once: true });
    setTimeout(go, 3500);
  } else {
    go();
  }
});

window.addEventListener('resize', () => {
  const cv = document.getElementById('confetti');
  cv.width = window.innerWidth;
  cv.height = window.innerHeight;
});

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
